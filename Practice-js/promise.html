<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  
  <body>
    <div>
      <p>Promise in JavaScript</p>
    </div>


    <script>
      console.log("This is promise");
      let prom1 = new Promise((resolve, reject) => {
        let a = Math.random();
        if (a < 0.5) {
          reject("random number is out of bound ");
        } else {
          setTimeout(() => {
            console.log("yes, Im done");
            resolve("Bingo");
          }, 3000);
        }
      });

      prom1
        .then((a) => {
          console.log("a");
        })
        .catch((err) => {
          //Use this to avoid errors in the console.
          console.log(err);
        });
    </script>
  </body>
</html>
